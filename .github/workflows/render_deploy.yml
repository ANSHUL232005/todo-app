name: CI / Render Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11]
        node-version: [20]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests (if available)
        working-directory: backend
        run: |
          echo "No tests configured; add pytest to run tests."

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run frontend build
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: |
          docker build -t todo-backend -f backend/Dockerfile backend

      - name: Build frontend image
        run: |
          docker build -t todo-frontend -f frontend/Dockerfile frontend

  render-deploy:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render deploy (using render.yaml)
        uses: renderinc/render-deploy-action@v1
        with:
          apiKey: ${{ secrets.RENDER_API_KEY }}
          yamlFile: render.yaml

