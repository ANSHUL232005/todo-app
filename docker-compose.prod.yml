# Production docker-compose with nginx reverse proxy
# Use this for HTTPS and advanced routing
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # PostgreSQL Database (Production-grade)
  postgres:
    image: postgres:15-alpine
    container_name: todo-postgres-prod
    environment:
      POSTGRES_USER: todouser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: tododb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - todo-network
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todouser"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: todo-backend-prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://todouser:${POSTGRES_PASSWORD}@postgres:5432/tododb
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - DEBUG=false
    networks:
      - todo-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - 8000

  # Frontend (React)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: todo-frontend-prod
    environment:
      - REACT_APP_API_URL=https://${API_DOMAIN}/api
    networks:
      - todo-network
    restart: always
    expose:
      - 3000

  nginx:
    container_name: todo-nginx
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - todo-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

networks:
  todo-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
