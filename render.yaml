services:
  - type: web
    name: todo-backend
    env: docker
    plan: free
    branch: main
    autoDeploy: true
    dockerfilePath: backend/Dockerfile
    region: oregon
    envVars:
      - key: DATABASE_URL
        value: "sqlite:///./todo.db"
      - key: SECRET_KEY
        fromDatabase: secrets
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_DAYS
        value: "7"
  - type: web
    name: todo-frontend
    env: docker
    plan: free
    branch: main
    autoDeploy: true
    dockerfilePath: frontend/Dockerfile
    region: oregon
    envVars:
      - key: API_URL
        value: "http://todo-backend:8000"
